name: MyBBSApp
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "16.0"

targets:
  MyBBSApp:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      # --- ここを追加：Info.plistを自動生成する ---
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: "MyBBS"
      INFOPLIST_KEY_UILaunchScreen_Generation: YES # 起動画面を自動生成
      # ------------------------------------------
      
      CODE_SIGNING_ALLOWED: false
      CODE_SIGNING_REQUIRED: false
      CODE_SIGN_IDENTITY: ""
      ENTITLEMENTS_REQUIRED: false
      DEVELOPMENT_TEAM: ""
