name: Browser
options:
  bundleIdPrefix: com.mybrowser
  deploymentTarget:
    iOS: "18.0"

packages:
  Swifter:
    url: https://github.com/httpswift/swifter.git
    from: 1.5.0

targets:
  Browser:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: Swifter
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: "Browser"
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      
      # HTTP通信(localhost)を許可するための設定
      INFOPLIST_KEY_NSAppTransportSecurity:
        NSAllowsArbitraryLoads: YES

      CODE_SIGNING_ALLOWED: false
      CODE_SIGNING_REQUIRED: false
      CODE_SIGN_IDENTITY: ""
      ENTITLEMENTS_REQUIRED: false
      DEVELOPMENT_TEAM: ""
