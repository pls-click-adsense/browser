name: Browser
options:
  bundleIdPrefix: com.mybrowser
  deploymentTarget:
    iOS: "18.0"

targets:
  Browser:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      GENERATE_INFOPLIST_FILE: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

      # 比率問題を解決する設定
      # キーの下にさらにUILaunchScreenを置くこの構造が、最新のXcodeビルドでは一番安定する
      INFOPLIST_KEY_UILaunchScreen:
        UILaunchScreen: {}

      # 日本語設定とネットワーク
      INFOPLIST_KEY_CFBundleDevelopmentRegion: "ja_JP"
      INFOPLIST_KEY_CFBundleDisplayName: "Browser"
      INFOPLIST_KEY_NSAppTransportSecurity:
        NSAllowsArbitraryLoads: YES
      
      # 署名なし実機用の最小設定
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
      AD_HOC_CODE_SIGNING_ALLOWED: YES
