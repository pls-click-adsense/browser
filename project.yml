name: Browser
options:
  bundleIdPrefix: com.mybrowser
  deploymentTarget:
    iOS: "18.0"

targets:
  Browser:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      GENERATE_INFOPLIST_FILE: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

      # --- ビルドエラー回避設定 ---
      # Releaseビルドでもプレビューやデバッグ用フラグを無視して通す設定
      SWIFT_OPTIMIZATION_LEVEL: "-Onone" 
      SWIFT_COMPILATION_MODE: singlefile
      
      # 比率問題解決
      INFOPLIST_KEY_UILaunchScreen: {}

      # 日本語 & ネットワーク
      INFOPLIST_KEY_CFBundleDevelopmentRegion: "ja_JP"
      INFOPLIST_KEY_CFBundleDisplayName: "Browser"
      INFOPLIST_KEY_NSAppTransportSecurity:
        NSAllowsArbitraryLoads: YES
      
      # 署名なし設定
      CODE_SIGNING_ALLOWED: false
      CODE_SIGNING_REQUIRED: false
      CODE_SIGN_IDENTITY: ""
      AD_HOC_CODE_SIGNING_ALLOWED: YES
