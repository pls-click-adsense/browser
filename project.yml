name: Browser
options:
  bundleIdPrefix: com.mybrowser
  deploymentTarget:
    iOS: "18.0"

targets:
  Browser:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: "Browser"
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      
      CODE_SIGNING_ALLOWED: false
      CODE_SIGNING_REQUIRED: false
      CODE_SIGN_IDENTITY: ""
      ENTITLEMENTS_REQUIRED: false
      DEVELOPMENT_TEAM: ""
