name: Browser
options:
  bundleIdPrefix: com.mybrowser
  deploymentTarget:
    iOS: "18.0"

targets:
  Browser:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      GENERATE_INFOPLIST_FILE: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

      # --- 比率がおかしくなるのを防ぐ決定的な設定 ---
      INFOPLIST_KEY_UILaunchScreen:
        # 空のディクショナリを指定することで「標準の起動画面」を使用させ、
        # アプリを全画面（ネイティブ解像度）で動かすように指示する
        {}: 

      # 日本語設定
      INFOPLIST_KEY_CFBundleDevelopmentRegion: "ja_JP"
      INFOPLIST_KEY_CFBundleDisplayName: "Browser"
      
      # ネットワーク設定
      INFOPLIST_KEY_NSAppTransportSecurity:
        NSAllowsArbitraryLoads: YES
      
      # 署名なし実機ビルド用
      CODE_SIGNING_ALLOWED: false
      CODE_SIGNING_REQUIRED: false
      CODE_SIGN_IDENTITY: ""
      AD_HOC_CODE_SIGNING_ALLOWED: YES
