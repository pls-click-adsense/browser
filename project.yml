name: Browser
options:
  bundleIdPrefix: com.mybrowser
  deploymentTarget:
    iOS: "18.0"
targets:
  Browser:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
  GENERATE_INFOPLIST_FILE: YES
  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  INFOPLIST_KEY_CFBundleDevelopmentRegion: "ja_JP"
  INFOPLIST_KEY_CFBundleDisplayName: "Browser"
  INFOPLIST_KEY_NSAppTransportSecurity: "{NSAllowsArbitraryLoads = 1;}"
  INFOPLIST_KEY_UILaunchScreen: "{}"

  # 👇 これ追加
  INFOPLIST_KEY_UIFileSharingEnabled: YES
  INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES

  CODE_SIGNING_ALLOWED: NO
  CODE_SIGNING_REQUIRED: NO
  CODE_SIGN_IDENTITY: ""
  AD_HOC_CODE_SIGNING_ALLOWED: YES
