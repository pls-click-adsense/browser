name: Browser
options:
  bundleIdPrefix: com.mybrowser
  deploymentTarget:
    iOS: "18.0"

targets:
  Browser:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      GENERATE_INFOPLIST_FILE: true
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_CFBundleDevelopmentRegion: ja_JP
      INFOPLIST_KEY_CFBundleDisplayName: Browser
      
      # --- ファイルアプリ対応設定 ---
      # iTunes/ファイルAppでの共有を有効にする
      INFOPLIST_KEY_UIFileSharingEnabled: true
      # ドキュメントをその場で開くことを許可（これがないとファイルアプリに表示されない場合があります）
      INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: true
      
      # --- 辞書型の設定（エラー修正済み） ---
      INFOPLIST_KEY_NSAppTransportSecurity:
        NSAllowsArbitraryLoads: true
      INFOPLIST_KEY_UILaunchScreen: {}
      
      # --- 署名関連 ---
      CODE_SIGNING_ALLOWED: false
      CODE_SIGNING_REQUIRED: false
      CODE_SIGN_IDENTITY: ""
      AD_HOC_CODE_SIGNING_ALLOWED: true
