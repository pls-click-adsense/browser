name: Browser
options:
  bundleIdPrefix: com.mybrowser
  deploymentTarget:
    iOS: "18.0"

targets:
  Browser:
    type: application
    platform: iOS
    # 配列形式 [Sources] にすることで、インデント起因のデコードエラーを確実に防ぎます
    sources: [Sources]
    info:
      plist:
        CFBundleDevelopmentRegion: ja_JP
        CFBundleDisplayName: Browser
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
    settings:
      GENERATE_INFOPLIST_FILE: true
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGNING_ALLOWED: false
      CODE_SIGNING_REQUIRED: false
      CODE_SIGN_IDENTITY: ""
      AD_HOC_CODE_SIGNING_ALLOWED: true
