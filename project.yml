name: MyBBSApp
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "16.0"

targets:
  MyBBSApp:
    type: application
    platform: iOS
    sources:
      - MyBBSApp
    settings:
      # 署名なしビルドを許容する設定
      CODE_SIGNING_ALLOWED: false
      CODE_SIGNING_REQUIRED: false
      CODE_SIGN_IDENTITY: ""
      ENTITLEMENTS_REQUIRED: false
      # 開発用チームIDを空にする
      DEVELOPMENT_TEAM: ""
