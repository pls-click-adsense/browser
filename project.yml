name: MyBBSApp
options:
  bundleIdPrefix: com.yourname
targets:
  MyBBSApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources: [MyBBSApp]
    settings:
      # ここで署名を無効化する設定を入れておくと楽
      CODE_SIGNING_ALLOWED: false
      CODE_SIGNING_REQUIRED: false
      CODE_SIGN_IDENTITY: ""
      ENTITLEMENTS_REQUIRED: false
