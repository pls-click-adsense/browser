name: Build iOS App (Manual)

on:
  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App (Code Signing Omitted)
        run: |
          # -derivedDataPath を指定して出力先を強制的にカレントディレクトリの 'build' にする
          xcodebuild build \
            -project Browser.xcodeproj \
            -scheme Browser \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create Payload and Zip (Pseudo-IPA)
        run: |
          mkdir -p Payload
          # xcodebuild の -derivedDataPath で指定した構造に合わせてコピー
          cp -r build/Build/Products/Release-iphoneos/Browser.app Payload/
          zip -r Browser.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Browser-IPA
          path: Browser.ipa
