name: Build Unsigned IPA

on:
  workflow_dispatch: # 手動実行ボタン用

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      # 1. XcodeGenのインストール
      - name: Install XcodeGen
        run: brew install xcodegen

      # 2. プロジェクトファイルの生成
      - name: Generate Xcode Project
        run: xcodegen generate

      # 3. ビルド実行 (署名なし設定を上書きで流し込む)
      - name: Build App
        run: |
          xcodebuild build \
            -project MyBBSApp.xcodeproj \
            -scheme MyBBSApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # 4. .appをipaに固める (Payloadフォルダを作るのがミソ)
      - name: Create IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/MyBBSApp.app Payload/
          zip -r MyBBSApp.ipa Payload
          
      # 5. 生成物をアップロード
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-IPA
          path: MyBBSApp.ipa
